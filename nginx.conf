# Nginx Configuration for AEGIS-SOC
# File: /etc/nginx/sites-available/aegis-soc

upstream aegis_api {
    least_conn;
    server localhost:3000 weight=1 max_fails=3 fail_timeout=30s;
    server localhost:3001 weight=1 max_fails=3 fail_timeout=30s;
    server localhost:3002 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=export_limit:10m rate=5r/m;

# Log format with request times
log_format aegis_log '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct="$upstream_connect_time" '
                     'uht="$upstream_header_time" urt="$upstream_response_time"';

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.aegis-soc.com www.api.aegis-soc.com;
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aegis-soc.com www.api.aegis-soc.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/api.aegis-soc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aegis-soc.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.aegis-soc.com/chain.pem;

    # SSL Configuration (A+ Grade)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_responder "http://ocsp.int-x3.letsencrypt.org";
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Logging
    access_log /var/log/nginx/aegis-soc-access.log aegis_log buffer=32k flush=5s;
    error_log /var/log/nginx/aegis-soc-error.log warn;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Client body size
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_disable "msie6";
    gzip_comp_level 6;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # API endpoints
    location /api/v1/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        
        # Preserve host header
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Connection reuse
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Custom headers for tracking
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Request-ID $request_id;
    }

    # Authentication endpoints (stricter rate limit)
    location ~ ^/api/v1/auth/(login|signup)$ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Export endpoints (limited)
    location ~ ^/api/v1/.*/export$ {
        limit_req zone=export_limit burst=2 nodelay;
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Static files (dashboard, website)
    location /admin/ {
        root /var/www/aegis-soc;
        try_files $uri $uri/ /admin/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /static/ {
        root /var/www/aegis-soc;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/aegis-soc;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Root
    location = / {
        root /var/www/aegis-soc;
        try_files /index.html =404;
    }

    # 404 error page
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/aegis-soc;
        internal;
    }

    # 50x error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Monitoring server (internal only)
server {
    listen 8080;
    server_name localhost;
    
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
