# Systemd Service Configuration for AEGIS-SOC API
# File: /etc/systemd/system/aegis-soc-api.service

[Unit]
Description=AEGIS-SOC Enterprise Cybersecurity Platform API
Documentation=https://docs.aegis-soc.com
After=network.target postgresql.service redis.service
Wants=postgresql.service redis.service
PartOf=aegis-soc.target

[Service]
Type=simple
User=aegis-soc
Group=aegis-soc
WorkingDirectory=/opt/aegis-soc

# Environment
EnvironmentFile=/opt/aegis-soc/.env
Environment="NODE_ENV=production"
Environment="NODE_OPTIONS=--max-old-space-size=4096"

# Command
ExecStart=/usr/bin/node /opt/aegis-soc/server.js

# Restart policy
Restart=on-failure
RestartSec=10s
StartLimitInterval=60s
StartLimitBurst=3

# Security hardening
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ProtectHome=yes
ReadWritePaths=/opt/aegis-soc/logs /opt/aegis-soc/uploads

# Resource limits
LimitNOFILE=65535
LimitNPROC=32768
MemoryMax=8G
MemoryAccounting=true

# Logging
StandardOutput=journal
StandardError=journal
SyslogIdentifier=aegis-soc-api

# Timeout
TimeoutStartSec=30
TimeoutStopSec=10

[Install]
WantedBy=multi-user.target

---

# Systemd Service Configuration for Nginx
# File: /etc/systemd/system/aegis-soc-nginx.service

[Unit]
Description=AEGIS-SOC Reverse Proxy and Web Server
Documentation=https://docs.aegis-soc.com
After=network-online.target
Wants=network-online.target

[Service]
Type=forking
PIDFile=/var/run/nginx.pid
ExecStartPre=/usr/sbin/nginx -t -q
ExecStart=/usr/sbin/nginx
ExecReload=/bin/kill -s HUP $MAINPID
ExecStop=/bin/kill -s QUIT $MAINPID
PrivateDevices=yes
NoNewPrivileges=true

StandardOutput=journal
StandardError=journal
SyslogIdentifier=nginx

Restart=on-failure
RestartSec=10

[Install]
WantedBy=multi-user.target

---

# Target for all AEGIS-SOC services
# File: /etc/systemd/system/aegis-soc.target

[Unit]
Description=AEGIS-SOC Cybersecurity Platform
Documentation=https://docs.aegis-soc.com

[Install]
WantedBy=multi-user.target

---

# Installation and Management Commands

# Create service user
sudo useradd -r -s /bin/false aegis-soc

# Create directories
sudo mkdir -p /opt/aegis-soc/{logs,uploads,backups}
sudo chown -R aegis-soc:aegis-soc /opt/aegis-soc

# Copy application files
sudo cp -r . /opt/aegis-soc/
sudo chown -R aegis-soc:aegis-soc /opt/aegis-soc

# Copy .env file
sudo cp .env.production /opt/aegis-soc/.env
sudo chown aegis-soc:aegis-soc /opt/aegis-soc/.env
sudo chmod 600 /opt/aegis-soc/.env

# Enable services
sudo systemctl enable aegis-soc-api.service
sudo systemctl enable aegis-soc-nginx.service
sudo systemctl enable aegis-soc.target

# Start services
sudo systemctl start aegis-soc.target

# Check status
sudo systemctl status aegis-soc.target

# View logs
sudo journalctl -u aegis-soc-api -f
sudo journalctl -u aegis-soc-nginx -f

# Restart services
sudo systemctl restart aegis-soc-api
sudo systemctl reload aegis-soc-nginx

# Stop services
sudo systemctl stop aegis-soc.target

# View service configuration
systemctl cat aegis-soc-api.service

# Edit service configuration
sudo systemctl edit aegis-soc-api.service

# Daemon reload after changes
sudo systemctl daemon-reload

---

# Log rotation configuration
# File: /etc/logrotate.d/aegis-soc

/opt/aegis-soc/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 aegis-soc aegis-soc
    sharedscripts
    postrotate
        systemctl reload aegis-soc-api > /dev/null 2>&1 || true
    endscript
}

/var/log/nginx/aegis-soc*.log {
    daily
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        systemctl reload aegis-soc-nginx > /dev/null 2>&1 || true
    endscript
}

---

# Backup cron job
# File: /etc/cron.daily/aegis-soc-backup

#!/bin/bash

BACKUP_DIR="/opt/aegis-soc/backups"
BACKUP_FILE="$BACKUP_DIR/aegis_$(date +\%Y\%m\%d_\%H\%M\%S).sql"
RETENTION_DAYS=30

# Create backup
pg_dump -U aegis_admin aegis_soc | gzip > "$BACKUP_FILE.gz"

# Upload to S3 (optional)
# aws s3 cp "$BACKUP_FILE.gz" s3://aegis-backups/

# Cleanup old backups
find "$BACKUP_DIR" -name "aegis_*.sql.gz" -mtime +$RETENTION_DAYS -delete

# Send notification
echo "Backup completed: $BACKUP_FILE.gz" | mail -s "AEGIS-SOC Backup" admin@aegis-soc.com

---

# Monitoring script
# File: /usr/local/bin/aegis-soc-health-check

#!/bin/bash

API_URL="http://localhost:3000/health"
DB_CHECK="sudo -u postgres psql -d aegis_soc -c 'SELECT 1;'"
REDIS_CHECK="redis-cli ping"

echo "=== AEGIS-SOC Health Check ==="
echo

# API Health
echo -n "API Status: "
if curl -s -f $API_URL > /dev/null; then
    echo "✓ OK"
else
    echo "✗ FAILED"
fi

# Database Health
echo -n "Database Status: "
if eval $DB_CHECK > /dev/null 2>&1; then
    echo "✓ OK"
else
    echo "✗ FAILED"
fi

# Redis Health
echo -n "Redis Status: "
if eval $REDIS_CHECK > /dev/null 2>&1; then
    echo "✓ OK"
else
    echo "✗ FAILED"
fi

# Disk Space
echo -n "Disk Usage: "
DISK_USAGE=$(df /opt/aegis-soc | awk 'NR==2 {print $5}' | sed 's/%//')
if [ $DISK_USAGE -gt 90 ]; then
    echo "✗ WARNING: ${DISK_USAGE}% used"
else
    echo "✓ OK: ${DISK_USAGE}%"
fi

# Memory Usage
echo -n "Memory Usage: "
MEM_USAGE=$(free | grep Mem | awk '{printf("%.0f", $3/$2 * 100)}')
if [ $MEM_USAGE -gt 80 ]; then
    echo "✗ WARNING: ${MEM_USAGE}%"
else
    echo "✓ OK: ${MEM_USAGE}%"
fi

echo
echo "=== End Health Check ==="

# Make executable
# chmod +x /usr/local/bin/aegis-soc-health-check

# Add to crontab for hourly checks
# 0 * * * * /usr/local/bin/aegis-soc-health-check >> /var/log/aegis-health-check.log 2>&1
